<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台灣生詞配對遊戲 - Taiwan Vocab Match</title>
    <style>
        :root {
            --primary-color: #2d5a27; /* 台灣山脈綠 */
            --accent-color: #e94e1b;   /* 活力橘 */
            --bg-color: #f4f1de;      /* 復古米白 */
            --card-back: #3d405b;     /* 深藍灰色 */
        }

        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        h1 {
            color: var(--primary-color);
            margin-bottom: 10px;
        }

        .stats {
            margin-bottom: 20px;
            font-size: 1.2rem;
            font-weight: bold;
        }

        /* 遊戲網格佈局：3x4 或 4x3 */
        .game-board {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            grid-gap: 15px;
            perspective: 1000px;
        }

        @media (min-width: 600px) {
            .game-board {
                grid-template-columns: repeat(4, 120px);
                grid-gap: 20px;
            }
        }

        /* 卡片設計 */
        .card {
            width: 100px;
            height: 140px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }

        @media (min-width: 600px) {
            .card {
                width: 120px;
                height: 160px;
            }
        }

        .card.flipped {
            transform: rotateY(180deg);
        }

        .card.matched {
            transform: rotateY(180deg) scale(0.95);
            opacity: 0.7;
            cursor: default;
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 12px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            border: 2px solid white;
        }

        /* 卡片背面 */
        .card-back {
            background-color: var(--card-back);
            color: white;
            font-size: 2rem;
        }

        /* 卡片正面 */
        .card-front {
            background-color: white;
            transform: rotateY(180deg);
            padding: 10px;
            text-align: center;
            box-sizing: border-box;
        }

        .card-icon {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        .card-word {
            font-size: 1.1rem;
            font-weight: bold;
            color: var(--primary-color);
            word-break: break-all;
        }

        /* 按鈕樣式 */
        .reset-btn {
            margin-top: 30px;
            padding: 10px 25px;
            font-size: 1rem;
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .reset-btn:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <h1>🇹🇼 台灣生詞配對</h1>
    
    <div class="stats">
        步數：<span id="moves">0</span> | 已配對：<span id="matches">0</span>/6
    </div>

    <div class="game-board" id="board">
        </div>

    <button class="reset-btn" onclick="initGame()">重新開始遊戲</button>

    <script>
        // 1. 定義生詞資料 (6 組，共 12 張)
        const items = [
            { word: '珍珠奶茶', icon: '🧋', id: 1 },
            { word: '台北 101', icon: '🗼', id: 2 },
            { word: '鳳梨酥', icon: '🍍', id: 3 },
            { word: '藍白拖', icon: '🩴', id: 4 },
            { word: '小籠包', icon: '🥟', id: 5 },
            { word: '天燈', icon: '🏮', id: 6 }
        ];

        let cards = [];
        let flippedCards = [];
        let moves = 0;
        let matchedCount = 0;
        let canFlip = true;

        // 2. 初始化遊戲
        function initGame() {
            const board = document.getElementById('board');
            board.innerHTML = '';
            flippedCards = [];
            moves = 0;
            matchedCount = 0;
            canFlip = true;
            document.getElementById('moves').textContent = moves;
            document.getElementById('matches').textContent = matchedCount;

            // 建立配對組 (一張顯示圖片，一張顯示文字)
            const deck = [];
            items.forEach(item => {
                // 圖片卡
                deck.push({ ...item, type: 'icon' });
                // 文字卡
                deck.push({ ...item, type: 'word' });
            });

            // 洗牌
            deck.sort(() => Math.random() - 0.5);

            // 渲染卡片
            deck.forEach((data, index) => {
                const card = document.createElement('div');
                card.classList.add('card');
                card.dataset.id = data.id;
                card.dataset.index = index;

                card.innerHTML = `
                    <div class="card-face card-back">?</div>
                    <div class="card-face card-front">
                        ${data.type === 'icon' 
                            ? `<div class="card-icon">${data.icon}</div>` 
                            : `<div class="card-word">${data.word}</div>`}
                    </div>
                `;

                card.addEventListener('click', flipCard);
                board.appendChild(card);
            });
        }

        // 3. 翻牌邏輯
        function flipCard() {
            if (!canFlip || this.classList.contains('flipped') || this.classList.contains('matched')) return;

            this.classList.add('flipped');
            flippedCards.push(this);

            if (flippedCards.length === 2) {
                moves++;
                document.getElementById('moves').textContent = moves;
                checkMatch();
            }
        }

        // 4. 檢查是否配對
        function checkMatch() {
            canFlip = false;
            const [card1, card2] = flippedCards;
            const isMatch = card1.dataset.id === card2.dataset.id;

            if (isMatch) {
                setTimeout(() => {
                    card1.classList.add('matched');
                    card2.classList.add('matched');
                    matchedCount++;
                    document.getElementById('matches').textContent = matchedCount;
                    flippedCards = [];
                    canFlip = true;

                    if (matchedCount === items.length) {
                        alert(`恭喜完成！總共花了 ${moves} 步。`);
                    }
                }, 600);
            } else {
                setTimeout(() => {
                    card1.classList.remove('flipped');
                    card2.classList.remove('flipped');
                    flippedCards = [];
                    canFlip = true;
                }, 1000);
            }
        }

        // 啟動
        initGame();
    </script>
</body>
</html>
