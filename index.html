<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>探索台灣：生詞挑戰</title>
    <style>
        :root {
            --primary: #2a9d8f;
            --secondary: #e76f51;
            --bg: #fefae0;
        }

        body {
            font-family: 'PingFang TC', sans-serif;
            background-color: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .header { text-align: center; margin-bottom: 10px; }
        .level-tag { 
            background: var(--primary); 
            color: white; 
            padding: 4px 12px; 
            border-radius: 15px; 
            font-size: 0.9rem;
        }

        .stats { margin: 15px 0; font-weight: bold; color: #444; }

        /* 遊戲板：3x4 佈局適合 12 張卡片 */
        .game-board {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            grid-gap: 12px;
            perspective: 1000px;
        }

        @media (min-width: 500px) {
            .game-board { grid-template-columns: repeat(4, 110px); }
        }

        /* 卡片樣式 */
        .card {
            width: 100px;
            height: 140px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.5s;
            cursor: pointer;
        }

        @media (min-width: 500px) {
            .card { width: 110px; height: 150px; }
        }

        .card.flipped { transform: rotateY(180deg); }
        .card.matched { transform: rotateY(180deg) scale(0.92); opacity: 0.6; cursor: default; }

        .card-face {
            position: absolute;
            width: 100%; height: 100%;
            backface-visibility: hidden;
            border-radius: 12px;
            border: 3px solid white;
            box-shadow: 0 4px 8px rgba(0,0,0,0.15);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
        }

        /* 背面：台灣風景圖 (九份) */
        .card-back {
            background-image: url('https://images.unsplash.com/photo-1552035391-7649f807206b?q=80&w=400&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
        }

        /* 第二關背面換成太魯閣風景 */
        .level-2 .card-back {
            background-image: url('https://images.unsplash.com/photo-1593784991039-659f4277df6b?q=80&w=400&auto=format&fit=crop');
        }

        .card-front {
            background-color: white;
            transform: rotateY(180deg);
            text-align: center;
            padding: 5px;
        }

        .card-icon { font-size: 2.5rem; margin-bottom: 5px; }
        .card-word { font-size: 1rem; font-weight: bold; color: #264653; }

        .btn {
            margin-top: 25px;
            padding: 10px 25px;
            background: var(--secondary);
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
        }

        /* 隱藏元素 */
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="header">
        <h1>🇹🇼 台灣生詞大考驗</h1>
        <span class="level-tag" id="level-display">第一關：在地美食</span>
    </div>

    <div class="stats">
        步數：<span id="moves">0</span> | 已配對：<span id="matches">0</span> / 6
    </div>

    <div class="game-board" id="board"></div>

    <button id="next-btn" class="btn hidden" onclick="startLevel2()">進入下一關</button>
    <button id="reset-btn" class="btn"
