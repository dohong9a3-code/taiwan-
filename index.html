<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>漢字快打王</title>
<style>
body {
    font-family: Arial, sans-serif;
    text-align: center;
    background: #f0f8ff;
    margin: 0;
}

.container {
    padding: 20px;
}

h1 {
    font-size: 40px;
}

#pinyin {
    font-size: 36px;
    margin: 20px;
}

.option {
    display: block;
    margin: 10px auto;
    padding: 15px;
    width: 200px;
    background: white;
    border-radius: 10px;
    cursor: pointer;
    font-size: 24px;
    border: 2px solid #ccc;
}

.option:hover {
    background: #e0f7fa;
}

#score, #timer {
    font-size: 20px;
    margin: 10px;
}

button {
    padding: 10px 20px;
    font-size: 20px;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="container">

    <h1>漢字快打王</h1>

    <div id="startScreen">
        <p>最高分：<span id="highScore">0</span></p>
        <button onclick="startGame()">開始遊戲</button>
    </div>

    <div id="gameScreen" style="display:none;">
        <div id="timer">時間：60</div>
        <div id="score">分數：0</div>
        <div id="pinyin"></div>
        <div id="options"></div>
    </div>

    <div id="endScreen" style="display:none;">
        <h2>遊戲結束！</h2>
        <p>你的分數：<span id="finalScore"></span></p>
        <button onclick="startGame()">再玩一次</button>
    </div>

</div>

<script>

const wordList = [
  { pinyin: "nǐ hǎo", hanzi: "你好" },
  { pinyin: "xiè xie", hanzi: "謝謝" },
  { pinyin: "zài jiàn", hanzi: "再見" },
  { pinyin: "shì", hanzi: "是" },
  { pinyin: "bù shì", hanzi: "不是" },
  { pinyin: "wǒ", hanzi: "我" },
  { pinyin: "nǐ", hanzi: "你" },
  { pinyin: "tā", hanzi: "他" },
  { pinyin: "shuǐ", hanzi: "水" },
  { pinyin: "fàn", hanzi: "飯" },
  { pinyin: "chī", hanzi: "吃" },
  { pinyin: "hē", hanzi: "喝" },
  { pinyin: "xué xiào", hanzi: "學校" },
  { pinyin: "lǎo shī", hanzi: "老師" },
  { pinyin: "xué shēng", hanzi: "學生" }
];

let score = 0;
let time = 60;
let timerInterval;
let currentAnswer = "";

function getHighScore() {
    return localStorage.getItem("highScore") || 0;
}

function setHighScore(newScore) {
    localStorage.setItem("highScore", newScore);
}

document.getElementById("highScore").innerText = getHighScore();

function startGame() {
    score = 0;
    time = 60;

    document.getElementById("startScreen").style.display = "none";
    document.getElementById("endScreen").style.display = "none";
    document.getElementById("gameScreen").style.display = "block";

    updateScore();
    startTimer();
    nextQuestion();
}

function startTimer() {
    clearInterval(timerInterval);
    timerInterval = setInterval(() => {
        time--;
        document.getElementById("timer").innerText = "時間：" + time;

        if (time <= 0) {
            endGame();
        }
    }, 1000);
}

function nextQuestion() {
    const random = wordList[Math.floor(Math.random() * wordList.length)];
    currentAnswer = random.hanzi;

    document.getElementById("pinyin").innerText = random.pinyin;

    let options = [random.hanzi];

    while (options.length < 3) {
        let rand = wordList[Math.floor(Math.random() * wordList.length)].hanzi;
        if (!options.includes(rand)) {
            options.push(rand);
        }
    }

    options.sort(() => Math.random() - 0.5);

    const optionsDiv = document.getElementById("options");
    optionsDiv.innerHTML = "";

    options.forEach(opt => {
        const btn = document.createElement("div");
        btn.className = "option";
        btn.innerText = opt;

        btn.onclick = () => checkAnswer(opt);

        optionsDiv.appendChild(btn);
    });
}

function checkAnswer(selected) {
    if (selected === currentAnswer) {
        score += 10;
    } else {
        score -= 5;
    }
    updateScore();
    nextQuestion();
}

function updateScore() {
    document.getElementById("score").innerText = "分數：" + score;
}

function endGame() {
    clearInterval(timerInterval);

    document.getElementById("gameScreen").style.display = "none";
    document.getElementById("endScreen").style.display = "block";

    document.getElementById("finalScore").innerText = score;

    let highScore = getHighScore();
    if (score > highScore) {
        setHighScore(score);
        document.getElementById("highScore").innerText = score;
    }
}

</script>

</body>
</html>
